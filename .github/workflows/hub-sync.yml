name: Hub Sync

# Phase 2 of the cross-workspace improvement sharing protocol (issue #32).
# Runs daily. Uses Claude to review active hub proposals that this
# workspace has not yet responded to and post a structured verdict
# (adopt / reject / defer) as a comment + label.
#
# This is comment-only mode. It does NOT open adoption PRs — that is
# Phase 3.

on:
  schedule:
    # Runs daily at 04:00 UTC (1 hour after hub-daily-sweep)
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  hub-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inject CI sandbox rules into CLAUDE.md
        run: |
          printf '\n\n' >> CLAUDE.md
          cat docs/ci-sandbox-rules.md >> CLAUDE.md

      - name: Resolve hub config from auto_tune_config.yml
        id: hub
        run: |
          enabled=$(yq '.hub.enabled // false' auto_tune_config.yml)
          repo=$(yq '.hub.repo // ""' auto_tune_config.yml)
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

      - name: Resolve model from auto_tune_config.yml
        id: model
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        run: |
          alias=$(yq '.models.auto_improve // "opus"' auto_tune_config.yml)
          id=$(yq ".model_aliases.\"$alias\" // \"$alias\"" auto_tune_config.yml)
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Check HUB_TOKEN availability
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          if [ -z "$HUB_TOKEN" ]; then
            echo "::warning::HUB_TOKEN secret is not provisioned. The sync workflow will not be able to comment on or label hub proposals."
          fi

      - name: Export hub env for composite action
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        run: |
          echo "HUB_REPO=${{ steps.hub.outputs.repo }}" >> "$GITHUB_ENV"
          echo "HUB_TOKEN=${{ secrets.HUB_TOKEN }}" >> "$GITHUB_ENV"
          echo "THIS_REPO=${{ github.repository }}" >> "$GITHUB_ENV"

      - name: Run Hub Sync
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        uses: ./.github/actions/claude-code-retry
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            Read the file `scripts/hub-sync-prompt.md` — it contains
            your full instructions. You are the daily sync half of the
            cross-workspace improvement sharing protocol.

            HUB_REPO=${{ steps.hub.outputs.repo }}
            THIS_REPO=${{ github.repository }}
            Today's date: $(date +%Y-%m-%d)

          claude_args: >-
            --model ${{ steps.model.outputs.id }}
            --allowed-tools
            Bash(gh api:*),
            Bash(gh issue:*),
            Bash(gh label:*),
            Bash(gh repo:*),
            Bash(jq:*),
            Bash(python3 *),
            Bash(mkdir *),
            Bash(cat *),
            Bash(echo *),
            Bash(ls *),
            Bash(head *),
            Read,
            Glob,
            Grep

      - name: Sync disabled notice
        if: steps.hub.outputs.enabled != 'true' || steps.hub.outputs.repo == ''
        run: |
          echo "hub.enabled is false or hub.repo is empty in auto_tune_config.yml; skipping."

      - name: Upload Claude session transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-transcript
          path: ~/.claude/projects/**/*.jsonl
          if-no-files-found: ignore
          retention-days: 30
