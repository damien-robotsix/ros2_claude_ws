name: Config Sanity Check

# Daily guard against dead keys in auto_tune_config.yml. Fails when any
# leaf key has no reader in scripts/, .github/workflows/, or run.sh —
# the class of bug tracked in issue #51, where config entries sit dead
# because the workflow hardcodes a literal fallback or the feature was
# deleted but the key lingered. See scripts/check-config-keys.py for
# the exact matching rules.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC as a belt-and-braces backstop in case a PR
    # somehow merges without the required check — the deterministic
    # per-PR run above is the primary defence.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  config-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check auto_tune_config.yml keys
        run: python3 scripts/check-config-keys.py
