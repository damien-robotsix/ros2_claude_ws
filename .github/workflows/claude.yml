name: Claude Code

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for Claude to create branches and push commits
      pull-requests: write # Required for Claude to open pull requests
      issues: write # Required for Claude to comment on issues
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inject CI sandbox rules into CLAUDE.md
        # CI-only prompt injection. Keeps docs/ci-sandbox-rules.md as the
        # single source of truth while leaving CLAUDE.md clean for local
        # (Docker / IDE) runs that don't hit the allowlist or sandbox.
        # Fixes the recurring pattern tracked in issues #27, #28, #29.
        run: |
          printf '\n\n' >> CLAUDE.md
          cat docs/ci-sandbox-rules.md >> CLAUDE.md

      - name: Resolve model from auto_tune_config.yml
        id: model
        run: |
          alias=$(yq '.models.claude_code // "opus"' auto_tune_config.yml)
          id=$(yq ".model_aliases.\"$alias\" // \"$alias\"" auto_tune_config.yml)
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: ./.github/actions/claude-code-retry
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: >-
            --model ${{ steps.model.outputs.id }}
            --allowed-tools
            Bash(git checkout:*),
            Bash(git switch:*),
            Bash(git branch:*),
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git fetch:*),
            Bash(git pull:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git restore:*),
            Bash(git rm:*),
            Bash(git mv:*),
            Bash(gh pr:*),
            Bash(gh issue:*),
            Bash(gh api:*),
            Bash(gh run:*),
            Read,
            Write,
            Edit,
            Glob,
            Grep

      - name: Upload Claude session transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-transcript
          path: ~/.claude/projects/**/*.jsonl
          if-no-files-found: ignore
          retention-days: 30

