services:
  claude:
    build:
      context: .
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    stdin_open: true
    tty: true
    # host network lets ROS2 DDS discovery work across containers / host
    network_mode: host
    volumes:
      - .:/workspace
      # Mount the whole .claude-home as /home/ubuntu so atomic writes
      # (write-tmp + rename) inside the container survive restarts.
      # Individual file mounts (.claude.json) break on rename.
      - ./.claude-home:/home/ubuntu
    working_dir: /workspace
