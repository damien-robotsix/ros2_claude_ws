services:
  claude:
    build:
      context: .
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    stdin_open: true
    tty: true
    # host network lets ROS2 DDS discovery work across containers / host
    network_mode: host
    volumes:
      - .:/workspace
      - ./.claude-home/.claude:/home/ubuntu/.claude
      - ./.claude-home/.claude.json:/home/ubuntu/.claude.json
      - ./.claude-home/.config/gh:/home/ubuntu/.config/gh
    working_dir: /workspace
