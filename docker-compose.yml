services:
  claude:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - ./.claude-home/.claude:/home/claude/.claude
      - ./.claude-home/.claude.json:/home/claude/.claude.json
      - ./.claude-home/.config/gh:/home/claude/.config/gh
    working_dir: /workspace
